<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      let order = {
        hotdogs: 0,
        fries: 0,
        soda: 0,
        sauerkraut: 0,
      };

      // let output = "";

      window.onload = function () {
        cart = document.querySelector(".cart");

        document.getElementById("addToCart").onclick = function () {
          // console.log("Add to Cart button clicked");
          let select = document.getElementById("select");
          // let selectedOption = select.value;
          // let selectedItem = select.selectedOptions[0].text;
          let selectedItem = select.options[select.selectedIndex].text;
          // console.log("Selected option:", selectedOption);
          console.log("Selected item:", selectedItem);
          // Update the order object based on the selected item
          if (selectedItem === "hotdogs") {
            order.hotdogs++;
          } else if (selectedItem === "fries") {
            order.fries++;
          } else if (selectedItem === "soda") {
            order.soda++;
          } else if (selectedItem === "sauerkraut") {
            order.sauerkraut++;
          }
          console.log(order);

          // cart.innerHTML = JSON.stringify(order);

          // clear the cart before updating
          let output = "";

          // Loop through the order and display  items with quantity > 0
          for (let item in order) {
            if (order[item] > 0) {
              output += item + ": " + order[item] + "<br>";
            }
          }
          console.log(output);

          // Update the cart section
          cart.innerHTML = output;
        };

        // for (let item in order) {
        //   if (order[item] > 0) {
        //     cart.innerHTML = item + ": " + order[item] + "<br>";
        //     document.write("<li>" + order[item] + "</li>");
        //   }
        // }
      };

      document.write("<h1>Part 5:  Using a class  </h1>");
      function MenuItem(item, price) {
        this.item = item;
        this.price = price;
      }
      const menu3 = [
        new MenuItem("hotdogs", 4),
        new MenuItem("fries", 3.5),
        new MenuItem("soda", 1.5),
        new MenuItem("sauerkraut", 1),
      ];

      document.write("<h2>Joe's Hotdogs Menu</h2>");
      document.write("<ul>");
      for (item in menu3) {
        document.write(
          "<li>" + menu3[item].item + " $" + menu3[item].price + "</li>",
        );
      }
      document.write("</ul>");
      document.write("<br><select id='select'>");

      menu3.forEach((menuItem) => {
        document.write(
          "<option value='" +
            menuItem.price +
            "'>" +
            menuItem.item +
            "</option>",
        );
      });
      document.write("</select>");

      // console.log(order);

      // document.write("<br><button class='button'>Add to Cart</button>");
    </script>
  </head>
  <body>
    <br />
    <!-- <select>
      <option value="4">hotdogs</option>
      <option value="3.5">fries</option>
      <option value="1.5">soda</option>
      <option value="1">sauerkraut</option>
    </select> -->
    <button class="button" id="addToCart">Add to Cart</button>
    <div class="cart">Future Content</div>
    <button class="button">Checkout</button>
  </body>
</html>
