<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joe's Hot Dogs</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
        /* "Trebuchet MS", "Lucida Sans Unicode", "Lucida Grande", "Lucida Sans",
          Arial, sans-serif; */
        /* "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif; */
        /* "Franklin Gothic Medium", "Arial Narrow", Arial, sans-serif; */
          Verdana, Geneva, Tahoma, sans-serif;

        background-color: rgb(128, 156, 92);
      }
      header {
        text-align: center;
        margin-top: 20px;
      }
      h1 {
        font-size: 2rem;
        text-align: center;
        margin-top: 20px;
        margin-bottom: 10px;
      }
      main {
        max-width: 400px;
        margin: 20px auto;
        background: white;
        padding: 30px;
        border-radius: 12px;
      }
      .menu ul {
        list-style: none;
        text-align: center;
        font-size: 1.1rem;
        padding: 10px 0;
        /* border: 1px solid red; */
        border-radius: 6px;
        background-color: #98c4ee;
        margin-bottom: 10px;
      }
      .menu li {
        padding: 5px;
      }
      .button {
        width: 100%;
        padding: 10px;
        margin-top: 20px;
        border-radius: 6px;
        background: green;
        color: white;
        font-size: 1rem;
        border: none;
        cursor: pointer;
      }
      .selector {
        width: 50%;
        padding: 8px;
        font-size: 1rem;
        border-radius: 6px;
        text-align: center;
      }
      .cart {
        margin-top: 20px;
        padding: 8px;
        border: 1px solid gray;
        border-radius: 6px;
        font-size: 1.1rem;
        text-align: center;
      }
      .image {
        width: 100%;
        border-radius: 10px;
        margin-bottom: 0px;
      }
      .caption {
        font-size: 0.7rem;
        text-align: center;
        margin-bottom: 20px;
        color: gray;
      }
      .select-section {
        margin-top: 20px;
        display: flex;
        align-items: center;
        /* justify-items: center; */
        gap: 20px;
        font-size: 1.1rem;
      }
    </style>

    <script>
      function MenuItem(item, price) {
        this.item = item;
        this.price = price;
      }
      const menu3 = [
        new MenuItem("hotdogs", 4),
        new MenuItem("fries", 3.5),
        new MenuItem("soda", 1.5),
        new MenuItem("sauerkraut", 1),
      ];

      let order = {
        hotdogs: 0,
        fries: 0,
        soda: 0,
        sauerkraut: 0,
      };

      window.onload = function () {
        let cart = document.querySelector(".cart");
        let output = "";

        showMenu(menu3); //show the menu
        populateSelect(menu3); //populate the select dropdown with menu items

        // Add to Cart button
        document.getElementById("addToCart").onclick = function () {
          // console.log("Add to Cart button clicked");
          let select = document.getElementById("select");
          // let selectedItem = select.selectedOptions[0].text;
          let selectedItem = select.options[select.selectedIndex].text; //Get the text from the selected option
          console.log("Selected item:", selectedItem);

          // Increase the count of the selected item
          // order[selectedItem] = order[selectedItem] + 1;
          order[selectedItem]++;

          console.log(`Active order: ${JSON.stringify(order)}`);

          // clear the cart before updating - IMPORTANT!
          output = "";

          // Loop through the order and display items with quantity > 0
          for (item in order) {
            if (order[item] > 0) {
              output += item + ": " + order[item] + "<br>";
            }
          }

          // Update the cart section
          cart.innerHTML = output;
        };

        // Checkout button
        document.getElementById("checkout").onclick = function () {
          console.log("Checkout button clicked");
          let total = 0;
          // console.log(order["hotdogs"]);

          // Loop through the menu and calculate the total
          menu3.forEach((menuItem) => {
            if (order[menuItem.item] > 0) {
              total += order[menuItem.item] * menuItem.price;
            }
          });

          // Generate the bill and display it in alert
          let bill = "";
          for (item in order) {
            if (order[item] > 0) {
              bill += item + " x " + order[item] + "\n";
              // console.log(`Ordered items: ${bill}`);
            }
          } // end of for loop
          alert(
            "*** Joe's Hodtogs Bill ***\n\n" +
              bill +
              "---------------\nTotal: $" +
              total.toFixed(2),
          ); //end of alert

          // Reset the order
          for (item in order) {
            order[item] = 0;
          }
          // console.log(`Order after reset: ${order}`);
          console.log(`Order after reset: ${JSON.stringify(order)}`);
          cart.innerHTML = "Cart is Empty";
        }; // end of checkout button
      }; //end of window.onload

      //Show the menu
      function showMenu(menu3) {
        let menu = document.getElementById("menu");

        //Build a list of menu items
        let menuContent = "<ul>";
        for (item in menu3) {
          menuContent +=
            "<li>" + menu3[item].item + " $" + menu3[item].price + "</li>";
        }
        menuContent += "</ul>";
        menu.innerHTML = menuContent;
      } //end of showMenu()

      function populateSelect(menuData) {
        const select = document.getElementById("select");

        let html = "";
        // Another way to loop through the menu data and populate build html
        menuData.forEach((menuItem) => {
          html +=
            "<option value='" +
            menuItem.price +
            "'>" +
            menuItem.item +
            "</option>";
        });

        select.innerHTML = html;
      } //end of populateSelect()
    </script>
  </head>
  <body>
    <header></header>
    <main>
      <img src="joes-hotdogs.jpg" alt="Joe's Hot Dogs" class="image" />
      <!-- <div class="caption">Source: http://joeshotdogsjoliet.com/history/</div> -->
      <h1>Menu</h1>
      <div class="menu" id="menu"></div>
      <div class="select-section">
        <label for="select">Select an item:</label>
        <select name="select" class="selector" id="select"></select>
      </div>
      <button class="button" id="addToCart">Add to Cart</button>
      <div class="cart">Cart is Empty</div>
      <button class="button" id="checkout">Checkout</button>
    </main>
    <footer></footer>
  </body>
</html>
