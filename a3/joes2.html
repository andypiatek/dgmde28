    <script>
      let order = {
        hotdogs: 0,
        fries: 0,
        soda: 0,
        sauerkraut: 0,
      };

      function MenuItem(item, price) {
        this.item = item;
        this.price = price;
      }
      const menu3 = [
        new MenuItem("hotdogs", 4),
        new MenuItem("fries", 3.5),
        new MenuItem("soda", 1.5),
        new MenuItem("sauerkraut", 1),
      ];

      // let output = "";

      window.onload = function () {
        let cart = document.querySelector(".cart");
        let output = "";

        showMenu(menu3);
        populateSelect(menu3);
        // let menu = document.getElementById("menu");
        // function MenuItem(item, price) {

        // let menuContent = "<ul>";

        //     "<li>" + menu3[item].item + " $" + menu3[item].price + "</li>";
        // }
        // menuContent += "</ul>";
        // menu.innerHTML = menuContent;

        document.getElementById("addToCart").onclick = function () {
          // console.log("Add to Cart button clicked");
          let select = document.getElementById("select");
          // let selectedOption = select.value;
          // let selectedItem = select.selectedOptions[0].text;
          let selectedItem = select.options[select.selectedIndex].text;
          // console.log("Selected option:", selectedOption);
          console.log("Selected item:", selectedItem);

          order[selectedItem] = order[selectedItem] + 1;
          // order[selectedItem]++;

          console.log(`Active order: ${JSON.stringify(order)}`);

          // cart.innerHTML = JSON.stringify(order);

          // clear the cart before updating
          output = "";

          // Loop through the order and display  items with quantity > 0
          for (item in order) {
            if (order[item] > 0) {
              output += item + ": " + order[item] + "<br>";
            }
          }
          // console.log(output);

          // Update the cart section
          cart.innerHTML = output;
        };

        // Checkout button
        document.getElementById("checkout").onclick = function () {
          console.log("Checkout button clicked");
          let total = 0;
          // console.log(order["hotdogs"]);

          // Loop through the menu and calculate the total
          menu3.forEach((menuItem) => {
            if (order[menuItem.item] > 0) {
              total += order[menuItem.item] * menuItem.price;
            }
          });

          // Generate the bill and display it in alert
          let bill = "";
          for (item in order) {
            if (order[item] > 0) {
              bill += item + ": " + order[item] + "\n";
              // console.log(`Ordered items: ${bill}`);
            }
          } // end of for loop
          alert(
            "*** Joe's Hodtogs Bill ***\n\n" +
              bill +
              "-------------\nTotal: $" +
              total.toFixed(2),
          ); //end of alert

          // Reset the order
          for (item in order) {
            order[item] = 0;
          }
          // console.log(`Order after reset: ${order}`);
          console.log(`Order after reset: ${JSON.stringify(order)}`);
          cart.innerHTML = "Cart is Empty";
        }; // end of checkout button
      }; //end of window.onload

      function showMenu(menu3) {
        let menu = document.getElementById("menu");

        let menuContent = "<ul>";
        for (item in menu3) {
          menuContent +=
            "<li>" + menu3[item].item + " $" + menu3[item].price + "</li>";
        }
        menuContent += "</ul>";
        menu.innerHTML = menuContent;
      }

      function populateSelect(menuData) {
        const select = document.getElementById("select");

        let html = "";

        menuData.forEach((menuItem) => {
          html +=
            "<option value='" +
            menuItem.price +
            "'>" +
            menuItem.item +
            "</option>";
          // html += `<option value="${menuItem.item}">
          //      ${menuItem.item} — $${menuItem.price}
          //    </option>`;
        });

        select.innerHTML = html;
      }

      <h1>Joe's Hotdogs</h1>
    </header>
    <main>
      <h2>Menu</h2>
      <div class="menu" id="menu"></div>
      <select name="select" id="select"></select>
      <button class="button" id="addToCart">Add to Cart</button>
      <div class="cart">Cart is Empty</div>
      <button class="button" id="checkout">Checkout</button>
