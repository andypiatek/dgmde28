<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      //
      // ***************** Part 1 ********************
      //
      document.write("<h1>Part 1:  Using an associative array </h1>");
      menu = new Array();
      menu["hotdogs"] = 4;
      menu["fries"] = 3.5;
      menu["soda"] = 1.5;
      menu["sauerkraut"] = 1;

      items = Object.keys(menu);
      document.write("<h2>Joe's Hotdogs Menu</h2>");
      // show all items with prices
      for (item in menu) {
        document.write("<li>" + item + " $" + menu[item] + "</li>");
      }
      //
      // ***************** Part 2 ********************
      //
      document.write("<h1>Part 2:  Using an object  </h1>");
      menu2 = {
        hotdogs: 4,
        fries: 3.5,
        soda: 1.5,
        sauerkraut: 1,
      };
      document.write("<h2>Joe's Hotdogs Menu</h2>");
      for (item in menu2) {
        document.write("<li>" + item + " $" + menu2[item] + "</li>");
      }
      //
      // ***************** Part 3 ********************
      //
      document.write("<h1>Part 3:  Using a class  </h1>");
      function MenuItem(item, price) {
        this.item = item;
        this.price = price;
      }
      menu3 = [
        new MenuItem("hotdogs", 4),
        new MenuItem("fries", 3.5),
        new MenuItem("soda", 1.5),
        new MenuItem("sauerkraut", 1),
      ];
      document.write("<h2>Joe's Hotdogs Menu</h2>");
      for (item in menu3) {
        document.write(
          "<li>" + menu3[item].item + " $" + menu3[item].price + "</li>",
        );
      }
    </script>
  </head>
  <body></body>
</html>
